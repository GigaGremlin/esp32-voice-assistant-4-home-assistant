# GGFW - ESP32S3-VAxx - Ver 5.0 - Final - external LED
# ESP32-S3 DevKitC-1 - Pinout für Voice Assistant mit ext. LED
################################################################
# GPIO5 -> MAX98357A (BCLK) & INMP441 (SCK)
# GPIO6 -> MAX98357A (LRC)  & INMP441 (WS)
# GPIO7 -> INMP441 (SD)
# GPIO8 -> MAX98357A (DIN)
# GPIO18 -> external LED
# INMP441 VCD -> 3,3Volt
# INMP441 GND -> GND
# INMP441 L/R -> GND
# MAX98357A Vin -> 5Volt
# MAX98357A GND -> GND
# MAX98357A SD -> left open (or GND)
# MAX98357A Gain -> 300 Ohm to GND for 12dB (open 9 dB)
################################################################

substitutions:
  name: esp32s3-va00            # Beispiel - Name !!!
  friendly_name: ESP32S3-VA00   # Beispiel - Friendly Name !!!

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  on_boot:
    priority: 600.0 # Stellt sicher, dass dies früh ausgeführt wird
    then:
      - output.turn_off: onboard_led_off_output # Schaltet den Output an GPIO48 aus
      # Sound 1 nach der Initialisierung
      - delay: 4s # Gibt dem System Zeit zum Starten bevor es die Datei abspielt
      - media_player.speaker.play_on_device_media_file:
          id: echo_media_player
          media_file: init_sound_file # Verwendet die neue, stumme Initialisierung
          announcement: true            
      # Sound 2 nach erfolgreichem Bootvorgang
      - delay: 18s # Gibt dem System Zeit zum Starten bevor es die Datei abspielt
      - media_player.speaker.play_on_device_media_file:
          id: echo_media_player
          media_file: boot_sound_wave_file # Verwendet die neue, leisere Startdatei
          announcement: true          
          

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_IDF_TARGET_ESP32S3: y
      CONFIG_ESP_SYSTEM_MEMPROT_FEATURE: y
      CONFIG_HEAP_TLSF_USE_EXTERNAL_MEM: y
      CONFIG_HEAP_IRAM_SIZE: "0x80000"
      CONFIG_HEAP_DRAM_SIZE: "0x200000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y

psram:
  mode: octal
  speed: 40MHz

logger:
  # Standard-Logger-Konfiguration
  logs:
    component.microphone: INFO # Geändert von DEBUG auf INFO
    component.i2s_audio: INFO # Geändert von DEBUG auf INFO
    component.voice_assistant: INFO # Geändert von DEBUG auf INFO

api:
  encryption:
    key: !secret esphome_api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
  - platform: web_server  # Add this for web-based OTA uploads

wifi:
  # use_address: 192.168.1.2    # IP ist Optional, nicht entfernen, wenn DHCP bevorzugt wird !
  ssid: !secret wifi_ssid       # Wifi SSID
  password: !secret wifi_password     # Wifi Password

web_server:
  port: 80

captive_portal:

improv_serial:

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5

microphone:
  - platform: i2s_audio
    id: echo_microphone
    i2s_audio_id: i2s_audio_bus
    i2s_din_pin: GPIO7
    adc_type: external
    pdm: false
    sample_rate: 16000
    channel: left             # Wichtig: Passt zur L/R-Pin-Verbindung auf GND

speaker:
  - platform: i2s_audio
    id: audio_output_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO8
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 16000
    channel: stereo           # STEREO gesetzt wegen Soundqualität
    buffer_duration: 60ms

media_player:
  - platform: speaker
    id: echo_media_player
    name: ${friendly_name}    # Wir nutzen einfach den friendly_name 
    announcement_pipeline:
      speaker: audio_output_speaker
      format: WAV
    codec_support_enabled: true
    buffer_size: 24000
    volume_min: 0.8
    files:
      - id: timer_finished_wave_file
        file: gg_alarm.wav        # Die WAV liegt dafür im ESPHome Ordner
      - id: init_sound_file       # Eindeutige ID für die Startdatei
        file: initial.wav         # Stumme Audiodatei bei Initialisierung
      - id: boot_sound_wave_file  # Eindeutige ID für die Startdatei
        file: boot.wav            # leise Audiodatei für den Start
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      - light.turn_on:
            id: led
            blue: 100%
            red: 0%
            green: 0%
            brightness: 100%
            effect: none
    on_idle:
      - script.execute: start_wake_word
      - script.execute: reset_led

voice_assistant:
  id: va
  micro_wake_word:
  microphone:
    microphone: echo_microphone
    channels: 0
    gain_factor: 8
  media_player: echo_media_player
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        effect: "Slow Pulse"
  on_stt_vad_end:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        effect: "Fast Pulse"
  on_tts_start:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: none
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - wait_until:
              - and:
                  - not:
                      voice_assistant.is_running:
                  - not:
                      speaker.is_playing:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: reset_led
  on_error:
    - light.turn_on:
        id: led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
        effect: none
    - delay: 2s
    - script.execute: reset_led
  on_client_connected:
    - delay: 2s
    - script.execute: start_wake_word
  on_client_disconnected:
    - script.execute: stop_wake_word
  on_timer_finished:
    - script.execute: stop_wake_word
    - wait_until:
        not:
          microphone.is_capturing:
    - switch.turn_on: timer_ringing
    - light.turn_on:
        id: led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 100%
        effect: "Fast Pulse"
    - wait_until:
        - switch.is_off: timer_ringing
    - light.turn_off: led
    - switch.turn_off: timer_ringing

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0            # Dies ist der BOOT-Button auf den meisten ESP32-S3 Boards
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    filters:
      - delayed_off: 50ms
      - delayed_on: 50ms
    on_press:
      - then:
          - media_player.toggle:
              id: echo_media_player
              announcement: False
          - voice_assistant.start:
              silence_detection: True
    on_release:
      - then:
          - voice_assistant.stop: {}

light:
  - platform: esp32_rmt_led_strip
    id: led
    name: Status LED
    entity_category: config
    pin: GPIO18                      # <--- Hier ist die Änderung für die externe LED
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

output:
  - platform: gpio
    pin: GPIO48
    id: onboard_led_off_output

script:
  - id: reset_led
    then:
      - if:
          condition:
            - lambda: return id(wake_word_engine_location).state == "On device";
            - switch.is_on: use_listen_light
          then:
            - light.turn_on:
                id: led
                red: 100%
                green: 89%
                blue: 71%
                brightness: 60%
                effect: none
            - delay: 5s               # Fügt eine Verzögerung von 5 Sekunden hinzu
            - light.turn_off: led     # Schaltet die LED nach 5 Sekunden aus
          else:
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state != "On device";
                  - switch.is_on: use_listen_light
                then:
                  - light.turn_on:
                      id: led
                      red: 0%
                      green: 100%
                      blue: 100%
                      brightness: 60%
                      effect: none
                  - delay: 5s             # Fügt eine Verzögerung von 5 Sekunden hinzu
                  - light.turn_off: led   # Schaltet die LED nach 5 Sekunden aus
                else:
                  - light.turn_off: led
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running: {}
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start: {}
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running: {}
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous: {}
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:

switch:
  - platform: template
    name: Use listen light
    id: use_listen_light
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led
  - platform: template
    id: timer_ringing
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - lambda: |-
          id(echo_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
            .set_announcement(true)
            .perform();
          id(echo_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
    on_turn_on:
      - lambda: |-
          id(echo_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
            .set_announcement(true)
            .perform();
          id(echo_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_wave_file
          announcement: true
# Timer Klingelzeit -> - 12 Sekunden (abh. von der Dateilänge) und nicht mehr - delay: 15min !!!
      - delay: 12sec
      - switch.turn_off: timer_ringing

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return x == "In Home Assistant";
          then:
            - micro_wake_word.stop:
            - delay: 500ms
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
      - if:
          condition:
            lambda: return x == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
            - delay: 500ms
            - micro_wake_word.start:

micro_wake_word:
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
  vad:
  models:
    - model: okay_nabu
    - model: hey_mycroft
    - model: hey_jarvis
